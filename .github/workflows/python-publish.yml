# This workflow will upload a Python Package to PyPI when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build release distributions
        run: |
          # NOTE: put your own distribution build steps here.
          python -m pip install build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  vacask-bin-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build vacask-bin wheels
        run: |
          VACASK_TAG=$(cat vacask-bin/VACASK_VERSION)
          python vacask-bin/build_wheels.py \
            --release-tag "$VACASK_TAG" \
            --output-dir dist/

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: vacask-bin-dists
          path: dist/

  pypi-publish-inspice:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/inspice

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish InSpice to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  pypi-publish-vacask-bin:
    runs-on: ubuntu-latest
    needs:
      - vacask-bin-build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/vacask-bin

    steps:
      - name: Retrieve vacask-bin distributions
        uses: actions/download-artifact@v4
        with:
          name: vacask-bin-dists
          path: dist/

      - name: Publish vacask-bin to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
